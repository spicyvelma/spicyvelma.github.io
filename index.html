body{

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:

.link{

    width:100%;

    color:white;
    background:rgba(255,40,40,.15);
    border:2px solid rgba(255,60,60,.45);
    padding:16px;
    border-radius:14px;
    margin:14px 0;
    font-weight:600;
    transition:.25s;

.link:hover{
    background:#ff2d2d;
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(255,0,0,.35);

.footer{

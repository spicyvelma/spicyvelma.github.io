<!DOCTYPE html>
<html>
<head>
  <title>Spicy Velma</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      color: white;
      text-align: center;
      font-family: Georgia, serif;
      background:
        radial-gradient(circle at center, rgba(255, 0, 0, .35), transparent 35%),
        linear-gradient(180deg, #2b0000, #050000);
    }

    .container {
      max-width: 650px;
      margin: auto;
      padding: 45px 20px;
    }

    .profile {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #ff3030;
      box-shadow: 0 0 25px #ff0000, 0 0 70px #ff0000;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 90px;
      margin: 25px 0 10px;
      text-shadow: 0 0 15px #ff0000, 0 0 35px #ff0000;
    }

    .bio {
      letter-spacing: 6px;
      color: #ff7777;
      margin-bottom: 25px;
    }

    .flame {
      font-size: 24px;
      margin-bottom: 25px;
    }

    .button {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 600px;
      margin: 16px auto;
      padding: 20px 28px;
      border-radius: 999px;
      border: 2px solid #ff3030;
      background: rgba(0,0,0,.65);
      color: white;
      text-decoration: none;
      font-size: 18px;
      letter-spacing: 4px;
      box-shadow: 0 0 18px rgba(255,0,0,.6);
    }

    .button:hover {
      transform: scale(1.03);
    }

    .icon {
      color: #ff5b5b;
      font-size: 24px;
    }

    .footer {
      margin-top: 35px;
      color: #ff7777;
      letter-spacing: 4px;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="container">

    <img class="profile" src="image.png" alt="Spicy Velma">

    <h1>Spicy Velma ♡</h1>

    <div class="bio">GAMER • CREATOR • COSPLAYER</div>

    <div class="flame">─ 🔥 ─</div>

    <a class="button" href="https://instagram.com/YOURUSERNAME">
      <span class="icon">◎</span> INSTAGRAM <span>›</span>
    </a>

    <a class="button" href="https://snapchat.com/add/YOURUSERNAME">
      <span class="icon">👻</span> SNAPCHAT <span>›</span>
    </a>

    <a class="button" href="https://x.com/YOURUSERNAME">
      <span class="icon">𝕏</span> X / TWITTER <span>›</span>
    </a>

    <a class="button" href="https://tiktok.com/@YOURUSERNAME">
      <span class="icon">♪</span> TIKTOK <span>›</span>
    </a>

    <a class="button" href="YOUR-EXCLUSIVE-LINK">
      <span class="icon">♡</span> EXCLUSIVE CONTENT ✨ <span>›</span>
    </a>

    <div class="footer">© 2026 SPICY VELMA</div>

  </div>
</body>
</html>
